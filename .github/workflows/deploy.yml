---
name: Deploy The Purple Terminal blog to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: # allows manual trigger from GitHub UI

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout blog repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # --- Pull files from dotfiles repo ---
      - name: Fetch docs from dotfiles repo
        run: |
          echo "Cloning dotfiles repo..."
          git clone https://github.com/verofa/dotfiles /tmp/dotfiles

          echo "Listing cloned files..."
          ls -la /tmp/dotfiles

          echo "Copying SETUP.md..."
          cp /tmp/dotfiles/SETUP.md docs/blog/purple-terminal-setup.md && echo " 🦄SETUP.md copied" || echo " 💩SETUP.md failed"

          echo "Listing docs folder..."
          ls -la docs/ ; ls -la docs/blog/

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build VitePress site
        run: npm run docs:build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: docs/.vitepress/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
