---
name: Deploy The Purple Terminal blog to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: # allows manual trigger from GitHub UI

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout blog repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # --- Pull files from dotfiles repo ---
      - name: Fetch docs from dotfiles repo
        run: |
          echo "Cloning dotfiles repo..."
          git clone https://github.com/verofa/dotfiles /tmp/dotfiles

          echo "Listing cloned files..."
          ls -la /tmp/dotfiles

          echo "Copying SETUP.md..."
          cp /tmp/dotfiles/SETUP.md docs/blog/terminal/purple-terminal-setup.md
          echo "🦄 SETUP.md copied"

          echo "Listing docs folder..."
          ls -la docs/ ; ls -la docs/blog/

      # --- NEW: Pull entire systems-design repo --
      - name: Fetch docs from systems-design repo
        run: |
          git clone https://github.com/verofa/systems-design /tmp/systems-design

          mkdir -p docs/blog/system-design

          # Copy root README as index
          cp /tmp/systems-design/README.md docs/blog/system-design/index.md

          # Copy all markdown files EXCEPT the root README
          find /tmp/systems-design -name "*.md" ! -path "/tmp/systems-design/README.md" | while read file; do
            relative="${file#/tmp/systems-design/}"
            mkdir -p "docs/blog/system-design/$(dirname $relative)"
            cp "$file" "docs/blog/system-design/$relative"
          done

          # Copy all images folders preserving structure
          find /tmp/systems-design -type d -name "images" | while read image_dir; do
            relative="${image_dir#/tmp/systems-design/}"
            mkdir -p "docs/blog/system-design/$relative"
            cp -r "$image_dir"/* "docs/blog/system-design/$relative/"
          done

          echo "🦄 Copied markdown files:"
          find docs/blog/system-design -name "*.md"

          echo "🦄 Copied image folders:"
          find docs/blog/system-design -type d -name "images"

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build VitePress site
        run: npm run docs:build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: docs/.vitepress/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
